# Local MVP stack: web + control-plane server + Postgres (+ optional MinIO).
# Usage:  cp .env.example .env  &&  docker compose up --build
# Daytona sandboxes are created remotely by the server via the Daytona SDK;
# they are NOT containers in this compose file.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Authoritative schema, applied on first boot of an empty data dir.
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file: .env
    environment:
      # Override host so the server reaches Postgres by service name in-network.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    volumes:
      - storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env
    ports:
      - "5173:5173"
    depends_on:
      - server

  # Optional: enable with `docker compose --profile storage up` and set
  # STORAGE_DRIVER=minio. FS driver is the default for MVP.
  minio:
    image: minio/minio:latest
    profiles: ["storage"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  storage:
  miniodata:
